<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>FWI Prediction</title>

    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #1d2671, #c33764);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
      }

      .container {
        background: white;
        padding: 40px;
        border-radius: 12px;
        width: 400px;
        box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.2);
        text-align: center;
      }

      h1 {
        margin-bottom: 20px;
        color: #333;
      }

      input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 14px;
      }

      input:focus {
        border-color: #4caf50;
        outline: none;
      }

      button {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        border: none;
        background: #4caf50;
        color: white;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        background: #45a049;
      }

      .result {
        margin-top: 20px;
        font-size: 18px;
        font-weight: bold;
        color: #222;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>FWI Prediction</h1>

      <form action="{{ url_for('predict_datapoint') }}" method="POST">
        <input
          type="text"
          name="Temperature"
          placeholder="Temperature"
          required
        />

        <input type="text" name="RH" placeholder="Relative Humidity" required />

        <input type="text" name="Ws" placeholder="Wind Speed" required />

        <input type="text" name="Rain" placeholder="Rain" required />

        <input type="text" name="FFMC" placeholder="FFMC" required />

        <input type="text" name="DMC" placeholder="DMC" required />

        <input type="text" name="ISI" placeholder="ISI" required />

        <input type="text" name="Classes" placeholder="Classes" required />

        <input type="text" name="Region" placeholder="Region" required />

        <button type="submit">Predict</button>
      </form>

      {% if result %}
      <div class="result">THE FWI prediction is {{ result }}</div>
      {% endif %}
    </div>
  </body>
</html>
